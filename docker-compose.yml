services:
  qlawkus:
    build:
      context: app
      dockerfile: src/main/docker/Dockerfile.jvm
    environment:
      - NVIDIA_AI_API_KEY=${NVIDIA_AI_API_KEY}
      - NVIDIA_CHAT_MODEL=${NVIDIA_CHAT_MODEL:-z-ai/glm-5.1}
      - NVIDIA_EMBEDDING_MODEL=${NVIDIA_EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-qlawkus}
      - QUARKUS_DATASOURCE_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - OLLAMA_FALLBACK_BASE_URL=http://ollama:11434
      - OLLAMA_FALLBACK_MODEL=${OLLAMA_FALLBACK_MODEL:-gemma4:e2b}
      - OLLAMA_FALLBACK_EMBEDDING_MODEL=${OLLAMA_FALLBACK_EMBEDDING_MODEL:-mxbai-embed-large}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_APP_ID=${DISCORD_APP_ID:-}
      - DISCORD_STARTUP_CHANNEL_ID=${DISCORD_STARTUP_CHANNEL_ID:-}
      - DISCORD_ALLOWED_USER_IDS=${DISCORD_ALLOWED_USER_IDS:-}
      - DISCORD_RESPOND_ALL=${DISCORD_RESPOND_ALL:-true}
      - WHISPER_API_KEY=${WHISPER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  qlawkus-native:
    build:
      context: app
      dockerfile: src/main/docker/Dockerfile.native-micro
    profiles:
      - native
    environment:
      - NVIDIA_AI_API_KEY=${NVIDIA_AI_API_KEY}
      - NVIDIA_CHAT_MODEL=${NVIDIA_CHAT_MODEL:-z-ai/glm-5.1}
      - NVIDIA_EMBEDDING_MODEL=${NVIDIA_EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-qlawkus}
      - QUARKUS_DATASOURCE_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - OLLAMA_FALLBACK_BASE_URL=http://ollama:11434
      - OLLAMA_FALLBACK_MODEL=${OLLAMA_FALLBACK_MODEL:-gemma4:e2b}
      - OLLAMA_FALLBACK_EMBEDDING_MODEL=${OLLAMA_FALLBACK_EMBEDDING_MODEL:-mxbai-embed-large}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_APP_ID=${DISCORD_APP_ID:-}
      - DISCORD_STARTUP_CHANNEL_ID=${DISCORD_STARTUP_CHANNEL_ID:-}
      - DISCORD_ALLOWED_USER_IDS=${DISCORD_ALLOWED_USER_IDS:-}
      - DISCORD_RESPOND_ALL=${DISCORD_RESPOND_ALL:-true}
      - WHISPER_API_KEY=${WHISPER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-qlawkus}"
      POSTGRES_USER: "${POSTGRES_USER:-qlawkus}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-qlawkus}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qlawkus} -d ${POSTGRES_DB:-qlawkus}"]
      interval: 5s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_FALLBACK_MODEL:-gemma4:e2b} && ollama pull ${OLLAMA_FALLBACK_EMBEDDING_MODEL:-mxbai-embed-large}"]
    environment:
      OLLAMA_HOST: "http://ollama:11434"

  volumes:
    pgdata:
    ollama-data:

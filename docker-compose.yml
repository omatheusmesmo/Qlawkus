services:
  qlawkus:
    build:
      context: app
      dockerfile: src/main/docker/Dockerfile.jvm
    env_file:
      - path: .env
        required: false
    environment:
      # Provider profile via kind. Default 'nvidia' => base-url + nemotron chat + nv-embedqa
      # embedding (1024 dims, input_type). Just set LLM_API_KEY (your NVIDIA key) in .env.
      # Switch provider with LLM_KIND (openai, deepseek, mistral, groq, xai, openrouter) or override
      # individual values with LLM_CHAT_MODEL / LLM_EMBEDDING_MODEL / EMBEDDING_DIMENSION.
      - LLM_KIND=${LLM_KIND:-nvidia}
      - LLM_API_KEY=${LLM_API_KEY}
      # Datasources + Ollama fallback point at docker service hostnames (not the property defaults).
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-qlawkus}
      - QUARKUS_DATASOURCE_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_JDBC_URL=jdbc:postgresql://postgres:5432/qlawkus_google_auth
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - QUARKUS_DATASOURCE_BRAG_JDBC_URL=jdbc:postgresql://postgres:5432/qlawkus_brag
      - QUARKUS_DATASOURCE_BRAG_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_BRAG_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - OLLAMA_FALLBACK_BASE_URL=http://ollama:11434
      - QLAWKUS_WORKSPACE_ROOT=/home/default/workspace
      # Below: only values that DIFFER from the application.properties defaults, or REMAP a .env var
      # to the name the app expects. Pure pass-throughs (tokens, etc.) come from env_file (.env) and
      # already default in the properties, so they are not repeated here. Likewise AGENT_*/memory-*.
      - DISCORD_ALLOWED_USER_IDS=${DISCORD_ALLOWED_USER_IDS:-*}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-*}
      # Google client-id/secret have no property default; supply empty so the app boots without Google.
      - QLAWKUS_GOOGLE_AUTH_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - QLAWKUS_GOOGLE_AUTH_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - QLAWKUS_VAULT_ENABLED=${QLAWKUS_VAULT_ENABLED:-true}
      - WHISPER_API_KEY=${GROQ_API_KEY:-}
      - WHISPER_BASE_URL=${WHISPER_BASE_URL:-https://api.groq.com/openai}
      - WHISPER_MODEL=${WHISPER_MODEL:-whisper-large-v3-turbo}
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - TTS_PT_BASE_URL=${TTS_PT_BASE_URL:-http://tts:8000}
      - TTS_EN_API_KEY=${GROQ_API_KEY:-}
      - TTS_EN_LOCAL_BASE_URL=${TTS_EN_LOCAL_BASE_URL:-http://tts:8000}
    volumes:
      # Mounted at HOME so the empty named volume inherits HOME's perms (uid 185 / gid 0)
      # on first init; the app then creates the workspace subdir itself.
      - workspace:/home/default
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8742:8080"

  qlawkus-native:
    build:
      context: app
      dockerfile: src/main/docker/Dockerfile.native-micro
    profiles:
      - native
    env_file:
      - path: .env
        required: false
    environment:
      # Provider profile via kind. Default 'nvidia' => base-url + nemotron chat + nv-embedqa
      # embedding (1024 dims, input_type). Just set LLM_API_KEY (your NVIDIA key) in .env.
      # Switch provider with LLM_KIND (openai, deepseek, mistral, groq, xai, openrouter) or override
      # individual values with LLM_CHAT_MODEL / LLM_EMBEDDING_MODEL / EMBEDDING_DIMENSION.
      - LLM_KIND=${LLM_KIND:-nvidia}
      - LLM_API_KEY=${LLM_API_KEY}
      # Datasources + Ollama fallback point at docker service hostnames (not the property defaults).
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-qlawkus}
      - QUARKUS_DATASOURCE_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_JDBC_URL=jdbc:postgresql://postgres:5432/qlawkus_google_auth
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - QUARKUS_DATASOURCE_BRAG_JDBC_URL=jdbc:postgresql://postgres:5432/qlawkus_brag
      - QUARKUS_DATASOURCE_BRAG_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_BRAG_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - OLLAMA_FALLBACK_BASE_URL=http://ollama:11434
      - QLAWKUS_WORKSPACE_ROOT=/home/default/workspace
      # Only values that DIFFER from the application.properties defaults, or REMAP a .env var.
      - DISCORD_ALLOWED_USER_IDS=${DISCORD_ALLOWED_USER_IDS:-*}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-*}
      - QLAWKUS_GOOGLE_AUTH_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - QLAWKUS_GOOGLE_AUTH_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - QLAWKUS_VAULT_ENABLED=${QLAWKUS_VAULT_ENABLED:-true}
      - WHISPER_API_KEY=${GROQ_API_KEY:-}
      - WHISPER_BASE_URL=${WHISPER_BASE_URL:-https://api.groq.com/openai}
      - WHISPER_MODEL=${WHISPER_MODEL:-whisper-large-v3-turbo}
    volumes:
      # Mounted at HOME so the empty named volume inherits HOME's perms (uid 185 / gid 0)
      # on first init; the app then creates the workspace subdir itself.
      - workspace:/home/default
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8742:8080"

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-qlawkus}"
      POSTGRES_USER: "${POSTGRES_USER:-qlawkus}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-qlawkus}"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qlawkus} -d ${POSTGRES_DB:-qlawkus}"]
      interval: 5s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_FALLBACK_MODEL:-qwen3.5:4b} && ollama pull ${OLLAMA_FALLBACK_EMBEDDING_MODEL:-mxbai-embed-large}"]
    environment:
      OLLAMA_HOST: "http://ollama:11434"

  tts-init:
    image: curlimages/curl:latest
    user: "0:0"
    volumes:
      - tts-voices:/voices
    entrypoint:
      - sh
      - -c
      - |
        set -e
        rh="https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0"
        if [ ! -f /voices/pt_BR-cadu-medium.onnx ]; then
          echo "Downloading pt_BR-cadu-medium voice..."
          curl -fsSL -o /voices/pt_BR-cadu-medium.onnx "$$rh/pt/pt_BR/cadu/medium/pt_BR-cadu-medium.onnx"
          curl -fsSL -o /voices/pt_BR-cadu-medium.onnx.json "$$rh/pt/pt_BR/cadu/medium/pt_BR-cadu-medium.onnx.json"
        fi
        if [ ! -f /voices/en_US-ryan-high.onnx ]; then
          echo "Downloading en_US-ryan-high voice..."
          curl -fsSL -o /voices/en_US-ryan-high.onnx "$$rh/en/en_US/ryan/high/en_US-ryan-high.onnx"
          curl -fsSL -o /voices/en_US-ryan-high.onnx.json "$$rh/en/en_US/ryan/high/en_US-ryan-high.onnx.json"
        fi
        echo "TTS voices ready."

  tts:
    image: ghcr.io/matatonic/openedai-speech-min
    depends_on:
      tts-init:
        condition: service_completed_successfully
    volumes:
      - ./docker/tts-config:/app/config
      - tts-voices:/app/voices
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
    name: qlawkus_pgdata
  ollama-data:
    name: qlawkus_ollama-data
  workspace:
    name: qlawkus_workspace
  tts-voices:

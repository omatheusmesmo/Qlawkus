services:
  qlawkus:
    build:
      context: app
      dockerfile: src/main/docker/Dockerfile.jvm
    environment:
      - NVIDIA_AI_API_KEY=${NVIDIA_AI_API_KEY}
      - NVIDIA_CHAT_MODEL=${NVIDIA_CHAT_MODEL:-z-ai/glm-5.1}
      - NVIDIA_EMBEDDING_MODEL=${NVIDIA_EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-qlawkus}
      - QUARKUS_DATASOURCE_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - OLLAMA_FALLBACK_BASE_URL=http://ollama:11434
      - OLLAMA_FALLBACK_MODEL=${OLLAMA_FALLBACK_MODEL:-gemma4:e2b}
      - OLLAMA_FALLBACK_EMBEDDING_MODEL=${OLLAMA_FALLBACK_EMBEDDING_MODEL:-mxbai-embed-large}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_APP_ID=${DISCORD_APP_ID:-}
      - DISCORD_STARTUP_CHANNEL_ID=${DISCORD_STARTUP_CHANNEL_ID:-}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - DISCORD_ALLOWED_USER_IDS=${DISCORD_ALLOWED_USER_IDS:-*}
      - DISCORD_RESPOND_ALL=${DISCORD_RESPOND_ALL:-true}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_MODE=${TELEGRAM_MODE:-polling}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-*}
      - WHISPER_API_KEY=${GROQ_API_KEY:-}
      - WHISPER_BASE_URL=${WHISPER_BASE_URL:-https://api.groq.com/openai}
      - WHISPER_MODEL=${WHISPER_MODEL:-whisper-large-v3-turbo}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8742/api/google/oauth/callback}
      - QLAWKUS_VAULT_ENABLED=${QLAWKUS_VAULT_ENABLED:-true}
      - QLAWKUS_VAULT_PASSPHRASE=${QLAWKUS_VAULT_PASSPHRASE:-}
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_JDBC_URL=jdbc:postgresql://postgres:5432/qlawkus_google_auth
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - QUARKUS_DATASOURCE_BRAG_JDBC_URL=jdbc:postgresql://postgres:5432/qlawkus_brag
      - QUARKUS_DATASOURCE_BRAG_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_BRAG_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - QLAWKUS_WORKSPACE_ROOT=/tmp/qlawkus-workspace
      - AGENT_SHARED_CONTEXT=${AGENT_SHARED_CONTEXT:-true}
      - AGENT_CONTEXT_TTL_MINUTES=${AGENT_CONTEXT_TTL_MINUTES:-60}
      - TTS_ENABLED=${TTS_ENABLED:-false}
      - TTS_DEFAULT_LANGUAGE=${TTS_DEFAULT_LANGUAGE:-en}
      - TTS_PT_KIND=${TTS_PT_KIND:-openai}
      - TTS_PT_BASE_URL=${TTS_PT_BASE_URL:-http://tts:8000}
      - TTS_PT_API_KEY=${TTS_PT_API_KEY:-}
      - TTS_PT_MODEL=${TTS_PT_MODEL:-tts-1}
      - TTS_PT_VOICE=${TTS_PT_VOICE:-pt_br}
      - TTS_EN_BASE_URL=${TTS_EN_BASE_URL:-https://api.groq.com/openai}
      - TTS_EN_API_KEY=${GROQ_API_KEY:-}
      - TTS_EN_MODEL=${TTS_EN_MODEL:-canopylabs/orpheus-v1-english}
      - TTS_EN_VOICE=${TTS_EN_VOICE:-troy}
      - TTS_EN_LOCAL_BASE_URL=${TTS_EN_LOCAL_BASE_URL:-http://tts:8000}
      - TTS_EN_LOCAL_MODEL=${TTS_EN_LOCAL_MODEL:-tts-1}
      - TTS_EN_LOCAL_VOICE=${TTS_EN_LOCAL_VOICE:-en_ryan}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8742:8080"

  qlawkus-native:
    build:
      context: app
      dockerfile: src/main/docker/Dockerfile.native-micro
    profiles:
      - native
    environment:
      - NVIDIA_AI_API_KEY=${NVIDIA_AI_API_KEY}
      - NVIDIA_CHAT_MODEL=${NVIDIA_CHAT_MODEL:-z-ai/glm-5.1}
      - NVIDIA_EMBEDDING_MODEL=${NVIDIA_EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-qlawkus}
      - QUARKUS_DATASOURCE_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - OLLAMA_FALLBACK_BASE_URL=http://ollama:11434
      - OLLAMA_FALLBACK_MODEL=${OLLAMA_FALLBACK_MODEL:-gemma4:e2b}
      - OLLAMA_FALLBACK_EMBEDDING_MODEL=${OLLAMA_FALLBACK_EMBEDDING_MODEL:-mxbai-embed-large}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_APP_ID=${DISCORD_APP_ID:-}
      - DISCORD_STARTUP_CHANNEL_ID=${DISCORD_STARTUP_CHANNEL_ID:-}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - DISCORD_ALLOWED_USER_IDS=${DISCORD_ALLOWED_USER_IDS:-*}
      - DISCORD_RESPOND_ALL=${DISCORD_RESPOND_ALL:-true}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_MODE=${TELEGRAM_MODE:-polling}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-*}
      - WHISPER_API_KEY=${GROQ_API_KEY:-}
      - WHISPER_BASE_URL=${WHISPER_BASE_URL:-https://api.groq.com/openai}
      - WHISPER_MODEL=${WHISPER_MODEL:-whisper-large-v3-turbo}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8742/api/google/oauth/callback}
      - QLAWKUS_VAULT_ENABLED=${QLAWKUS_VAULT_ENABLED:-true}
      - QLAWKUS_VAULT_PASSPHRASE=${QLAWKUS_VAULT_PASSPHRASE:-}
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_JDBC_URL=jdbc:postgresql://postgres:5432/qlawkus_google_auth
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_GOOGLE_AUTH_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - QUARKUS_DATASOURCE_BRAG_JDBC_URL=jdbc:postgresql://postgres:5432/qlawkus_brag
      - QUARKUS_DATASOURCE_BRAG_USERNAME=${POSTGRES_USER:-qlawkus}
      - QUARKUS_DATASOURCE_BRAG_PASSWORD=${POSTGRES_PASSWORD:-qlawkus}
      - QLAWKUS_WORKSPACE_ROOT=/tmp/qlawkus-workspace
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8742:8080"

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-qlawkus}"
      POSTGRES_USER: "${POSTGRES_USER:-qlawkus}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-qlawkus}"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qlawkus} -d ${POSTGRES_DB:-qlawkus}"]
      interval: 5s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_FALLBACK_MODEL:-gemma4:e2b} && ollama pull ${OLLAMA_FALLBACK_EMBEDDING_MODEL:-mxbai-embed-large}"]
    environment:
      OLLAMA_HOST: "http://ollama:11434"

  tts-init:
    image: curlimages/curl:latest
    user: "0:0"
    volumes:
      - tts-voices:/voices
    entrypoint:
      - sh
      - -c
      - |
        set -e
        rh="https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0"
        if [ ! -f /voices/pt_BR-cadu-medium.onnx ]; then
          echo "Downloading pt_BR-cadu-medium voice..."
          curl -fsSL -o /voices/pt_BR-cadu-medium.onnx "$$rh/pt/pt_BR/cadu/medium/pt_BR-cadu-medium.onnx"
          curl -fsSL -o /voices/pt_BR-cadu-medium.onnx.json "$$rh/pt/pt_BR/cadu/medium/pt_BR-cadu-medium.onnx.json"
        fi
        if [ ! -f /voices/en_US-ryan-high.onnx ]; then
          echo "Downloading en_US-ryan-high voice..."
          curl -fsSL -o /voices/en_US-ryan-high.onnx "$$rh/en/en_US/ryan/high/en_US-ryan-high.onnx"
          curl -fsSL -o /voices/en_US-ryan-high.onnx.json "$$rh/en/en_US/ryan/high/en_US-ryan-high.onnx.json"
        fi
        echo "TTS voices ready."

  tts:
    image: ghcr.io/matatonic/openedai-speech-min
    depends_on:
      tts-init:
        condition: service_completed_successfully
    volumes:
      - ./docker/tts-config:/app/config
      - tts-voices:/app/voices
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  ollama-data:
  tts-voices:

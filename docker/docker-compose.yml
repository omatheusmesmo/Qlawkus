services:
  qlawkus:
    build:
      context: .
      dockerfile: docker/Dockerfile.jvm
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-qlawkus}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-quarkus}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-quarkus}
      QUARKUS_PROFILE: ${QUARKUS_PROFILE:-prod}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      API_USER_PASSWORD: ${API_USER_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "/opt/entrypoint.sh"]
    volumes:
      - ./docker/entrypoint.sh:/opt/entrypoint.sh:ro

  qlawkus-native:
    build:
      context: .
      dockerfile: docker/Dockerfile.native-micro
    profiles:
      - native
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-qlawkus}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-quarkus}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-quarkus}
      QUARKUS_PROFILE: ${QUARKUS_PROFILE:-prod}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      API_USER_PASSWORD: ${API_USER_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qlawkus}
      POSTGRES_USER: ${POSTGRES_USER:-quarkus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quarkus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quarkus} -d ${POSTGRES_DB:-qlawkus}"]
      interval: 5s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_MODEL:-gemma4:e2b} && ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}"]
    environment:
      OLLAMA_HOST: http://ollama:11434

volumes:
  pgdata:
  ollama-data:

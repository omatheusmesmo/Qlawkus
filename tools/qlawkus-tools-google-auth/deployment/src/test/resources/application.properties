quarkus.application.name=qlawkus-google-auth-test

quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=true
quarkus.flyway.baseline-on-migrate=true

qlawkus.google.auth.client-id=test-client-id
qlawkus.google.auth.client-secret=test-client-secret
qlawkus.google.vault.enabled=false
qlawkus.google.vault.encryption-passphrase=test-vault-passphrase

quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.embedding-model.provider=ollama
quarkus.langchain4j.ollama.chat-model.model-name=test
quarkus.langchain4j.ollama.chat-model.temperature=0
quarkus.langchain4j.ollama.embedding-model.model-name=test
quarkus.langchain4j.ollama.timeout=10s
quarkus.langchain4j.openai.api-key=dummy

%test.qlawkus.startup-thought.enabled=false

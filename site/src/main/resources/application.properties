# Roq static site for the Qlawkus docs.
# Content is in site/content/ (SoT), synced to docs/modules/ROOT/pages/ by maven-resources-plugin.

# Overridden by CI for GitHub Pages (e.g. https://<user>.github.io and /qlawkus)
site.url=${SITE_URL:http://localhost:8080}
site.path-prefix=${SITE_PATH_PREFIX:}

quarkus.asciidoc.attributes.icons=font
quarkus.asciidoc.attributes.source-highlighter=highlight.js

# --- Dummy values for extension config required at runtime ---
# The site module has deployment dependencies on messaging/google extensions for
# config-doc generation. At runtime these extensions load and require their config.
# These dummy values prevent startup failures during local doc development.
qlawkus.messaging.whatsapp.access-token=dummy-not-used
qlawkus.messaging.whatsapp.phone-number-id=dummy-not-used
qlawkus.messaging.whatsapp.verify-token=dummy-not-used
qlawkus.google.auth.client-id=dummy-not-used
qlawkus.google.auth.client-secret=dummy-not-used
qlawkus.messaging.slack.bot-token=dummy-not-used
qlawkus.messaging.transcription.api-key=dummy-not-used

# langchain4j openai primary model (required by client extension)
quarkus.langchain4j.openai."primary".api-key=dummy-not-used
quarkus.langchain4j.openai."primary".base-url=http://localhost:1/mock

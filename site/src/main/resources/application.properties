# Roq static site for the Qlawkus docs (pure Roq, no agent extensions).
# Content is in site/content/ (SoT), synced to docs/modules/ROOT/pages/ by the docs module.

# Overridden by CI for GitHub Pages / Surge previews (e.g. https://<user>.github.io and /qlawkus).
site.url=${SITE_URL:http://localhost:8080}
site.path-prefix=${SITE_PATH_PREFIX:}

quarkus.asciidoc.attributes.icons=font
quarkus.asciidoc.attributes.source-highlighter=highlight.js

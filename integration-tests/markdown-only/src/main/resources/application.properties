quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.qlawkus=qlawkus-test
quarkus.security.users.embedded.roles.qlawkus=admin
quarkus.http.auth.basic=true

# No datasource, no Flyway, no pgvector here: the qlawkus-cognition-pgvector extension is not on the
# classpath, so the agent runs on the markdown @DefaultBean stores. Every file root lives under
# target/ so the run is self-contained and wiped by mvn clean.
%test.qlawkus.test.mock-mode=true
%test.qlawkus.startup-thought.enabled=false
%test.qlawkus.agent.facts.root=target/markdown-only/facts
%test.qlawkus.agent.episodic.root=target/markdown-only/journals
%test.qlawkus.agent.working-memory.root=target/markdown-only/working-memory
%test.qlawkus.agent.state.root=target/markdown-only/state
%test.qlawkus.skills.roots=target/markdown-only/skills

# Database-free secret store: only the qlawkus.secrets.* convention is set here. The qlawkus-client
# extension publishes the keystore at ordinal 350, above this application.properties (250), so the
# keystore value below for qlawkus.test.secret loses to the stored secret - proving the layering. The
# keystore (src/test/resources/secrets-test.p12) holds the alias qlawkus.test.secret; testpassword
# unlocks the store (a test fixture, never a real secret).
%test.qlawkus.secrets.keystore-path=secrets-test.p12
%test.qlawkus.secrets.keystore-password=testpassword
%test.qlawkus.test.secret=value-from-application-properties-should-lose

%test.quarkus.wiremock.devservices.enabled=true
%test.quarkus.langchain4j.openai."primary".base-url=http://localhost:${quarkus.wiremock.devservices.port}/v1
%test.quarkus.langchain4j.openai."primary".api-key=test-key
%test.quarkus.langchain4j.openai."primary".timeout=120s
%test.quarkus.langchain4j.ollama."fallback".base-url=http://localhost:11434
%test.qlawkus.embedding.base-url=http://localhost:${quarkus.wiremock.devservices.port}/v1
%test.qlawkus.embedding.api-key=test-key

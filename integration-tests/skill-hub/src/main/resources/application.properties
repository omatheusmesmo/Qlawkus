quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.qlawkus=qlawkus-test
quarkus.security.users.embedded.roles.qlawkus=admin
quarkus.http.auth.basic=true

# Markdown stores only (no pgvector on the classpath). Every file root lives under target/ so the run
# is self-contained and wiped by mvn clean.
%test.qlawkus.test.mock-mode=true
%test.qlawkus.startup-thought.enabled=false
%test.qlawkus.agent.facts.root=target/skill-hub/facts
%test.qlawkus.agent.episodic.root=target/skill-hub/journals
%test.qlawkus.agent.working-memory.root=target/skill-hub/working-memory
%test.qlawkus.agent.state.root=target/skill-hub/state
%test.qlawkus.skills.roots=target/skill-hub/skills

# Point the skill hub at WireMock; yolo so install/publish act without a confirm round-trip in the IT.
%test.qlawkus.skill-hub.base-url=http://localhost:${quarkus.wiremock.devservices.port}
%test.qlawkus.skill-hub.well-known-hosts=http://localhost:${quarkus.wiremock.devservices.port}
%test.qlawkus.skill-hub.approval-mode=yolo
%test.qlawkus.skill-hub.publish.enabled=true
%test.qlawkus.skill-hub.publish.dir=target/skill-hub/published

%test.quarkus.wiremock.devservices.enabled=true
%test.quarkus.langchain4j.openai."primary".base-url=http://localhost:${quarkus.wiremock.devservices.port}/v1
%test.quarkus.langchain4j.openai."primary".api-key=test-key
%test.quarkus.langchain4j.openai."primary".timeout=120s
%test.quarkus.langchain4j.ollama."fallback".base-url=http://localhost:11434
%test.qlawkus.embedding.base-url=http://localhost:${quarkus.wiremock.devservices.port}/v1
%test.qlawkus.embedding.api-key=test-key

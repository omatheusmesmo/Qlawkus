# Argon2id admin auth, statically enabled so it is compiled into the native image and exercised by the
# native IT below (the whole point of this module: prove the Bouncy Castle Argon2id path works under
# GraalVM). Config is unprefixed, not %test, because the native binary runs in the prod profile. The
# hash is a PHC Argon2id hash of the password 'argon2-native-pw'.
quarkus.http.auth.basic=true
qlawkus.admin.argon2.enabled=true
qlawkus.admin.password-hash=$argon2id$v=19$m=19456,t=2,p=1$THv4RRsZpwcVWM5tYolYXQ$Mt2aZTDRVka1pS+dsPHkqLVs3/3VljJd51mIX8vnHt0

# Database-free markdown stores; keep their roots under target/ so the run is self-contained (empty
# roots at boot mean no embedding call), and disable the startup thought so boot needs no LLM.
qlawkus.startup-thought.enabled=false
qlawkus.agent.facts.root=target/qlawkus-it/facts
qlawkus.agent.episodic.root=target/qlawkus-it/journals
qlawkus.agent.working-memory.root=target/qlawkus-it/working-memory
qlawkus.agent.state.root=target/qlawkus-it/state
qlawkus.skills.roots=target/qlawkus-it/skills

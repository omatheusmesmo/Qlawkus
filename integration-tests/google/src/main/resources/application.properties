quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.qlawkus=qlawkus-test
quarkus.security.users.embedded.roles.qlawkus=admin
quarkus.http.auth.basic=true

%test.qlawkus.test.mock-mode=true
%test.qlawkus.startup-thought.enabled=false
# No cognition datasource here (qlawkus-cognition-pgvector is not on the classpath): the agent runs on
# the markdown stores. Keep their file roots under target/ so the IT never touches the developer's real
# ~/.qlawkus and is wiped by mvn clean.
%test.qlawkus.agent.facts.root=target/qlawkus-it/facts
%test.qlawkus.agent.episodic.root=target/qlawkus-it/journals
%test.qlawkus.agent.working-memory.root=target/qlawkus-it/working-memory
%test.qlawkus.agent.state.root=target/qlawkus-it/state
%test.qlawkus.skills.roots=target/qlawkus-it/skills
%test.quarkus.wiremock.devservices.enabled=true
%test.quarkus.langchain4j.openai."primary".base-url=http://localhost:${quarkus.wiremock.devservices.port}/v1
%test.quarkus.langchain4j.openai."primary".api-key=test-key
%test.quarkus.langchain4j.ollama."fallback".base-url=http://localhost:11434
%test.quarkus.langchain4j.openai."primary".timeout=120s
%test.qlawkus.google.auth.client-id=test-client-id
%test.qlawkus.google.auth.client-secret=test-client-secret
%test.qlawkus.google.calendar.enabled=true
%test.qlawkus.google.gmail.enabled=true
%test.qlawkus.google.drive.enabled=true
%test.qlawkus.google.sheets.enabled=true
%test.qlawkus.google.storage.enabled=true
%test.qlawkus.google.vault.enabled=false
%test.qlawkus.google.calendar.calendar-id=primary
%test.qlawkus.google.storage.project-id=test-project
%test.quarkus.rest-client."dev.omatheusmesmo.qlawkus.tools.google.calendar.GoogleCalendarRestClient".url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client."dev.omatheusmesmo.qlawkus.tools.google.gmail.GoogleGmailRestClient".url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client."dev.omatheusmesmo.qlawkus.tools.google.drive.GoogleDriveRestClient".url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client."dev.omatheusmesmo.qlawkus.tools.google.drive.GoogleDriveDownloadClient".url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client."dev.omatheusmesmo.qlawkus.tools.google.drive.GoogleDriveUploadClient".url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client."dev.omatheusmesmo.qlawkus.tools.google.sheets.GoogleSheetsRestClient".url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client."dev.omatheusmesmo.qlawkus.tools.google.storage.GoogleStorageRestClient".url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client."dev.omatheusmesmo.qlawkus.tools.google.storage.GoogleStorageDownloadClient".url=http://localhost:${quarkus.wiremock.devservices.port}
%test.qlawkus.embedding.base-url=http://localhost:${quarkus.wiremock.devservices.port}/v1
%test.qlawkus.embedding.api-key=test-key

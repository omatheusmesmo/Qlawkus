quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.qlawkus=qlawkus-test
quarkus.security.users.embedded.roles.qlawkus=admin
quarkus.http.auth.basic=true

%test.qlawkus.test.mock-mode=true
%test.qlawkus.startup-thought.enabled=false
%test.quarkus.hibernate-orm.schema-management.strategy=validate
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.wiremock.devservices.enabled=true
%test.quarkus.langchain4j.openai."primary".base-url=http://localhost:${quarkus.wiremock.devservices.port}/v1
%test.quarkus.langchain4j.openai."primary".api-key=test-key
%test.quarkus.langchain4j.ollama."fallback".base-url=http://localhost:11434
%test.quarkus.langchain4j.openai."primary".timeout=120s
%test.qlawkus.embedding.base-url=http://localhost:${quarkus.wiremock.devservices.port}/v1
%test.qlawkus.embedding.api-key=test-key
%test.qlawkus.skills.roots=target/skills-it
# Markdown roots used by the reconcile/migrate IT (pgvector backend ignores them otherwise).
%test.qlawkus.agent.facts.root=target/reconcile-it/facts
%test.qlawkus.agent.episodic.root=target/reconcile-it/journals
%test.qlawkus.agent.working-memory.root=target/reconcile-it/working-memory
%test.qlawkus.agent.state.root=target/reconcile-it/state

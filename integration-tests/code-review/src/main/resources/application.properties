quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.qlawkus=qlawkus-test
quarkus.security.users.embedded.roles.qlawkus=admin
quarkus.http.auth.basic=true

%test.quarkus.http.test-port=0
%test.qlawkus.test.mock-mode=true
%test.qlawkus.startup-thought.enabled=false

# M6 LocalSecurityPolicy: restrict shell to build-tool allowlist only.
# This is the intended production policy for the code-review sandbox.
qlawkus.shell.allowlist-mode=true
qlawkus.shell.allowlist=mvn,mvn *,./mvnw,./mvnw *,gradle,gradle *,./gradlew,./gradlew *,npm,npm *,yarn,yarn *,pnpm,pnpm *,gh,gh *,git,git *
# No cognition datasource here (qlawkus-cognition-pgvector is not on the classpath): the agent runs on
# the markdown stores. Keep their file roots under target/ so the IT never touches the developer's real
# ~/.qlawkus and is wiped by mvn clean.
%test.qlawkus.agent.facts.root=target/qlawkus-it/facts
%test.qlawkus.agent.episodic.root=target/qlawkus-it/journals
%test.qlawkus.agent.working-memory.root=target/qlawkus-it/working-memory
%test.qlawkus.agent.state.root=target/qlawkus-it/state
%test.qlawkus.skills.roots=target/qlawkus-it/skills
%test.quarkus.wiremock.devservices.enabled=true
%test.quarkus.langchain4j.openai."primary".base-url=http://localhost:${quarkus.wiremock.devservices.port}/v1
%test.quarkus.langchain4j.openai."primary".api-key=test-key
%test.quarkus.langchain4j.ollama."fallback".base-url=http://localhost:11434
%test.quarkus.langchain4j.openai."primary".timeout=120s
%test.qlawkus.embedding.base-url=http://localhost:${quarkus.wiremock.devservices.port}/v1
%test.qlawkus.embedding.api-key=test-key

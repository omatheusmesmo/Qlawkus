quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.qlawkus=${API_USER_PASSWORD:qlawkus}
quarkus.security.users.embedded.roles.qlawkus=admin
quarkus.http.auth.basic=true

%test.qlawkus.startup-thought.enabled=false

# client/deployment has no pgvector extension on the classpath, so the agent boots database-free on
# the markdown @DefaultBean stores with no backend property needed. Point every file root under
# target/ so runs are isolated from the developer's real ~/.qlawkus and wiped by mvn clean.
%test.qlawkus.agent.facts.root=target/qlawkus-test/facts
%test.qlawkus.agent.episodic.root=target/qlawkus-test/journals
%test.qlawkus.agent.working-memory.root=target/qlawkus-test/working-memory
%test.qlawkus.agent.state.root=target/qlawkus-test/state
%test.qlawkus.skills.roots=target/qlawkus-test/skills

%test.quarkus.langchain4j.ollama.timeout=300s
%test.quarkus.langchain4j."primary".chat-model.provider=ollama
%test.quarkus.langchain4j.ollama."primary".chat-model.model-name=gemma4:e2b
%test.quarkus.wiremock.devservices.enabled=true
%test.quarkus.langchain4j.ollama.devservices.enabled=false
%test.quarkus.langchain4j.ollama."primary".base-url=http://localhost:\${quarkus.wiremock.devservices.port}
%test.quarkus.langchain4j.ollama.base-url=http://localhost:\${quarkus.wiremock.devservices.port}
%test.quarkus.langchain4j.openai."primary".base-url=http://localhost:\${quarkus.wiremock.devservices.port}/v1
%test.quarkus.langchain4j.openai."primary".api-key=test-key
%test.quarkus.security.users.embedded.users.qlawkus=qlawkus-test

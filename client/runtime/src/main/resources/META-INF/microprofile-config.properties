# Database-free secret store, contributed by the qlawkus-client extension. Shipped as
# microprofile-config.properties (ordinal 100) so the application's application.properties (ordinal
# 250) and the environment still override every key here. It wires the SmallRye keystore config
# source to the Qlawkus convention: a PKCS12 keystore whose aliases are config property names, so a
# stored secret transparently overrides the matching environment variable with no change in the
# consumer. The source is lenient when the keystore file is absent, so this stays inert until a
# keystore exists - a fresh install boots on .env with nothing to configure.
smallrye.config.source.keystore."qlawkus".path=${qlawkus.secrets.keystore-path:${user.home}/.qlawkus/secrets.p12}
smallrye.config.source.keystore."qlawkus".password=${qlawkus.secrets.keystore-password:}

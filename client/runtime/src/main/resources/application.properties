quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

quarkus.langchain4j.pgvector.table=embeddings
quarkus.langchain4j.pgvector.metadata.storage-mode=combined-jsonb
quarkus.langchain4j.pgvector.metadata.column-definitions=metadata JSONB NULL
# pgvector.dimension is emitted by LlmKindConfigSourceFactory from the resolved embedding kind.

# Primary chat: openai-compatible provider. base-url, api-key and chat-model.model-name are emitted by
# LlmKindConfigSourceFactory from qlawkus.openai.kind (LLM_KIND) + LLM_* overrides (registered as a
# config source via LlmKindConfigBuilder in ClientProcessor). The primary embedding is built by
# PrimaryEmbeddingModelProducer (langchain4j upstream, for dimensions + input_type). Set LLM_KIND to
# one of: openai, nvidia, deepseek, mistral, groq, xai, openrouter.
quarkus.langchain4j."primary".chat-model.provider=openai

quarkus.langchain4j."fallback".chat-model.provider=ollama
quarkus.langchain4j."fallback".embedding-model.provider=ollama
quarkus.langchain4j.ollama."fallback".chat-model.model-name=${OLLAMA_FALLBACK_MODEL:qwen3.5:4b}
quarkus.langchain4j.ollama."fallback".embedding-model.model-name=${OLLAMA_FALLBACK_EMBEDDING_MODEL:mxbai-embed-large}

quarkus.langchain4j.devservices.enabled=false
quarkus.langchain4j.ollama.devservices.enabled=false

qlawkus.shell.prompts=[#$>] ,>>> ,\\$ ,#

quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

quarkus.langchain4j.pgvector.table=embeddings
quarkus.langchain4j.pgvector.dimension=${EMBEDDING_DIMENSION:1024}
quarkus.langchain4j.pgvector.metadata.storage-mode=combined-jsonb
quarkus.langchain4j.pgvector.metadata.column-definitions=metadata JSONB NULL

quarkus.langchain4j."nvidia".chat-model.provider=openai
quarkus.langchain4j."nvidia".embedding-model.provider=openai
quarkus.langchain4j.openai."nvidia".base-url=${NVIDIA_BASE_URL:https://integrate.api.nvidia.com/v1}
quarkus.langchain4j.openai."nvidia".api-key=${NVIDIA_AI_API_KEY:dummy}
quarkus.langchain4j.openai."nvidia".chat-model.model-name=${NVIDIA_CHAT_MODEL:z-ai/glm-5.1}
quarkus.langchain4j.openai."nvidia".embedding-model.model-name=${NVIDIA_EMBEDDING_MODEL:nvidia/nv-embedqa-e5-v5}

quarkus.langchain4j."ollama-fallback".chat-model.provider=ollama
quarkus.langchain4j."ollama-fallback".embedding-model.provider=ollama
quarkus.langchain4j.ollama."ollama-fallback".chat-model.model-name=${OLLAMA_FALLBACK_MODEL:gemma4:e2b}
quarkus.langchain4j.ollama."ollama-fallback".embedding-model.model-name=${OLLAMA_FALLBACK_EMBEDDING_MODEL:mxbai-embed-large}

qlawkus.nvidia.embedding-model.enabled=true
quarkus.langchain4j.devservices.enabled=false
quarkus.langchain4j.ollama.devservices.enabled=false

qlawkus.shell.prompts=[#$>] ,>>> ,\\$ ,#

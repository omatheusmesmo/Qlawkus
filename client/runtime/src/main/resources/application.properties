quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.langchain4j.pgvector.table=embeddings
quarkus.langchain4j.pgvector.dimension=${EMBEDDING_DIMENSION:1024}
quarkus.langchain4j.pgvector.metadata.storage-mode=combined-jsonb
quarkus.langchain4j.pgvector.metadata.column-definitions=metadata JSONB NULL
qlawkus.shell.workspace-root=.
qlawkus.shell.denylist=sudo *,su *,rm -rf /*,mkfs*,dd if=*,format,shutdown,reboot
qlawkus.shell.allowlist-mode=false
qlawkus.shell.max-concurrent=10
qlawkus.shell.max-output-bytes=1048576
qlawkus.shell.max-output-lines=5000
qlawkus.shell.pty.max-sessions=10
qlawkus.shell.pty.idle-timeout-minutes=30
qlawkus.shell.pty.buffer-lines=50000
qlawkus.shell.pty.default-cols=120
qlawkus.shell.pty.default-rows=40
qlawkus.shell.default-shell=auto
qlawkus.shell.clean-profile=true
qlawkus.shell.prompts=[#$>] ,>>> ,\\$ ,#
qlawkus.file.max-read-size=5242880
qlawkus.file.max-write-size=10485760
qlawkus.file.encoding=UTF-8

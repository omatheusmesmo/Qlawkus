quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.qlawkus=${API_USER_PASSWORD:qlawkus}
quarkus.security.users.embedded.roles.qlawkus=admin
quarkus.http.auth.basic=true

qlawkus.google.auth.client-id=${GOOGLE_CLIENT_ID}
qlawkus.google.auth.client-secret=${GOOGLE_CLIENT_SECRET}
qlawkus.google.vault.enabled=${QLAWKUS_VAULT_ENABLED:false}
qlawkus.google.vault.encryption-passphrase=${QLAWKUS_VAULT_PASSPHRASE:}
qlawkus.google.calendar.enabled=${QLAWKUS_CALENDAR_ENABLED:false}

quarkus.flyway.locations=db/migration

quarkus.datasource."google-auth".db-kind=postgresql
quarkus.hibernate-orm."google-auth".datasource=google-auth
quarkus.hibernate-orm."google-auth".physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

quarkus.flyway."google-auth".migrate-at-start=true
quarkus.flyway."google-auth".baseline-on-migrate=true
quarkus.flyway."google-auth".locations=db/migration-google-auth

%dev.quarkus.langchain4j.devservices.enabled=true
%dev.quarkus.langchain4j.ollama.devservices.enabled=true
%dev.quarkus.hibernate-orm.schema-management.strategy=validate
%dev.quarkus.flyway.clean-at-start=true
%dev.quarkus.flyway."google-auth".clean-at-start=true

%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/qlawkus}
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:qlawkus}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:qlawkus}
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%prod.quarkus.datasource."google-auth".jdbc.url=${QUARKUS_DATASOURCE_GOOGLE_AUTH_JDBC_URL:jdbc:postgresql://localhost:5432/qlawkus_google_auth}
%prod.quarkus.datasource."google-auth".username=${QUARKUS_DATASOURCE_GOOGLE_AUTH_USERNAME:qlawkus}
%prod.quarkus.datasource."google-auth".password=${QUARKUS_DATASOURCE_GOOGLE_AUTH_PASSWORD:qlawkus}
%prod.quarkus.hibernate-orm."google-auth".schema-management.strategy=validate

quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.qlawkus=${API_USER_PASSWORD:qlawkus}
quarkus.security.users.embedded.roles.qlawkus=admin
quarkus.http.auth.basic=true

# Cognition backend (build-time): the deployable app uses hybrid - markdown files are the editable,
# git-versionable source of truth for facts, journals and skills, mirrored into pgvector for scale;
# working memory and the live persona/profile singletons stay in Postgres. Reconciliation runs once
# at boot (qlawkus.cognition.reconcile-at-start) so the file <-> pg mirror stays consistent.
qlawkus.cognition.backend=hybrid

qlawkus.google.auth.client-id=${GOOGLE_CLIENT_ID}
qlawkus.google.auth.client-secret=${GOOGLE_CLIENT_SECRET}
qlawkus.google.auth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8742/api/google/oauth/callback}
qlawkus.google.vault.enabled=${QLAWKUS_VAULT_ENABLED:false}
qlawkus.google.vault.encryption-passphrase=${QLAWKUS_VAULT_PASSPHRASE:}
qlawkus.google.calendar.enabled=${QLAWKUS_CALENDAR_ENABLED:false}
qlawkus.brag.enabled=${QLAWKUS_BRAG_ENABLED:false}

qlawkus.messaging.discord.bot-token=${DISCORD_BOT_TOKEN:}
qlawkus.messaging.discord.application-id=${DISCORD_APP_ID:}
qlawkus.messaging.discord.startup-channel-id=${DISCORD_STARTUP_CHANNEL_ID:}
qlawkus.messaging.discord.guild-id=${DISCORD_GUILD_ID:}
qlawkus.messaging.discord.respond-to-all-messages=${DISCORD_RESPOND_ALL:true}
qlawkus.messaging.auth.allowed-users.discord=${DISCORD_ALLOWED_USER_IDS:}
qlawkus.messaging.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
qlawkus.messaging.telegram.mode=${TELEGRAM_MODE:polling}
qlawkus.messaging.auth.allowed-users.telegram=${TELEGRAM_ALLOWED_USER_IDS:}
qlawkus.messaging.transcription.api-key=${WHISPER_API_KEY:}
qlawkus.messaging.transcription.base-url=${WHISPER_BASE_URL:https://api.openai.com}
qlawkus.messaging.transcription.model=${WHISPER_MODEL:whisper-1}

qlawkus.messaging.tts.enabled=${TTS_ENABLED:false}
qlawkus.messaging.tts.default-language=${TTS_DEFAULT_LANGUAGE:en}
qlawkus.messaging.tts.providers.pt.kind=${TTS_PT_KIND:openai}
qlawkus.messaging.tts.providers.pt.base-url=${TTS_PT_BASE_URL:http://localhost:8000}
qlawkus.messaging.tts.providers.pt.api-key=${TTS_PT_API_KEY:}
qlawkus.messaging.tts.providers.pt.model=${TTS_PT_MODEL:tts-1}
qlawkus.messaging.tts.providers.pt.voice=${TTS_PT_VOICE:pt_br}
qlawkus.messaging.tts.providers.en.base-url=${TTS_EN_BASE_URL:https://api.groq.com/openai}
qlawkus.messaging.tts.providers.en.api-key=${TTS_EN_API_KEY:}
qlawkus.messaging.tts.providers.en.model=${TTS_EN_MODEL:canopylabs/orpheus-v1-english}
qlawkus.messaging.tts.providers.en.voice=${TTS_EN_VOICE:troy}
qlawkus.messaging.tts.providers.en.fallback=en_local
qlawkus.messaging.tts.providers.en_local.base-url=${TTS_EN_LOCAL_BASE_URL:http://localhost:8000}
qlawkus.messaging.tts.providers.en_local.model=${TTS_EN_LOCAL_MODEL:tts-1}
qlawkus.messaging.tts.providers.en_local.voice=${TTS_EN_LOCAL_VOICE:en_ryan}

quarkus.langchain4j.openai."primary".timeout=${LLM_TIMEOUT:180s}
quarkus.langchain4j.ollama."fallback".base-url=${OLLAMA_FALLBACK_BASE_URL:http://localhost:11434}
quarkus.langchain4j.ollama."fallback".chat-model.model-name=${OLLAMA_FALLBACK_MODEL:qwen3.5:4b}
quarkus.langchain4j.ollama."fallback".timeout=${OLLAMA_TIMEOUT:120s}

qlawkus.agent.shared-context.enabled=${AGENT_SHARED_CONTEXT:true}
qlawkus.agent.context-ttl-minutes=${AGENT_CONTEXT_TTL_MINUTES:60}
qlawkus.agent.memory.min-score=${AGENT_MEMORY_MIN_SCORE:0.7}
qlawkus.agent.memory.max-results=${AGENT_MEMORY_MAX_RESULTS:10}
quarkus.langchain4j.chat-memory.memory-window.max-messages=${AGENT_MEMORY_MAX_MESSAGES:40}

qlawkus.agent.active-memory.enabled=${AGENT_ACTIVE_MEMORY:true}
qlawkus.agent.active-memory.max-results=${AGENT_ACTIVE_MEMORY_MAX_RESULTS:5}
qlawkus.agent.active-memory.min-score=${AGENT_ACTIVE_MEMORY_MIN_SCORE:0.7}

qlawkus.agent.transcript-archive.enabled=${AGENT_TRANSCRIPT_ARCHIVE:true}
qlawkus.agent.transcript-search.max-results=${AGENT_TRANSCRIPT_MAX_RESULTS:5}
qlawkus.agent.transcript-search.min-score=${AGENT_TRANSCRIPT_MIN_SCORE:0.7}

qlawkus.memory-review.similarity-threshold=${AGENT_MEMORY_REVIEW_SIMILARITY:0.97}
qlawkus.memory-curation.enabled=${AGENT_MEMORY_CURATION:true}

quarkus.flyway.locations=db/migration

quarkus.datasource."google-auth".db-kind=postgresql
quarkus.hibernate-orm."google-auth".datasource=google-auth
quarkus.hibernate-orm."google-auth".physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.flyway."google-auth".migrate-at-start=true
quarkus.flyway."google-auth".baseline-on-migrate=true
quarkus.flyway."google-auth".locations=db/migration-google-auth

quarkus.datasource."brag".db-kind=postgresql
quarkus.hibernate-orm."brag".datasource=brag
quarkus.hibernate-orm."brag".physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.flyway."brag".migrate-at-start=true
quarkus.flyway."brag".baseline-on-migrate=true
quarkus.flyway."brag".locations=db/migration-brag

%dev.quarkus.langchain4j.devservices.enabled=true
%dev.quarkus.langchain4j.ollama.devservices.enabled=true
%dev.quarkus.hibernate-orm.schema-management.strategy=validate
%dev.quarkus.flyway.clean-at-start=true
%dev.quarkus.flyway."google-auth".clean-at-start=true
%dev.quarkus.flyway."brag".clean-at-start=true

%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/qlawkus}
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:qlawkus}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:qlawkus}
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%prod.quarkus.datasource."google-auth".jdbc.url=${QUARKUS_DATASOURCE_GOOGLE_AUTH_JDBC_URL:jdbc:postgresql://localhost:5432/qlawkus_google_auth}
%prod.quarkus.datasource."google-auth".username=${QUARKUS_DATASOURCE_GOOGLE_AUTH_USERNAME:qlawkus}
%prod.quarkus.datasource."google-auth".password=${QUARKUS_DATASOURCE_GOOGLE_AUTH_PASSWORD:qlawkus}
%prod.quarkus.hibernate-orm."google-auth".schema-management.strategy=validate
%prod.quarkus.datasource."brag".jdbc.url=${QUARKUS_DATASOURCE_BRAG_JDBC_URL:jdbc:postgresql://localhost:5432/qlawkus_brag}
%prod.quarkus.datasource."brag".username=${QUARKUS_DATASOURCE_BRAG_USERNAME:qlawkus}
%prod.quarkus.datasource."brag".password=${QUARKUS_DATASOURCE_BRAG_PASSWORD:qlawkus}
%prod.quarkus.hibernate-orm."brag".schema-management.strategy=validate

# M6 LocalSecurityPolicy — activate to restrict shell to code-review build tools only.

quarkus.application.name=qlawkus

quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.qlawkus=${API_USER_PASSWORD:qlawkus}
quarkus.security.users.embedded.roles.qlawkus=admin
quarkus.http.auth.basic=true

qlawkus.google.auth.client-id=${GOOGLE_CLIENT_ID}
qlawkus.google.auth.client-secret=${GOOGLE_CLIENT_SECRET}
qlawkus.google.vault.enabled=${QLAWKUS_VAULT_ENABLED:false}
qlawkus.google.vault.encryption-passphrase=${QLAWKUS_VAULT_PASSPHRASE:}

quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=false
quarkus.flyway.baseline-on-migrate=true

quarkus.langchain4j.pgvector.table=embeddings
quarkus.langchain4j.pgvector.dimension=${EMBEDDING_DIMENSION:1024}
quarkus.langchain4j.pgvector.metadata.storage-mode=combined-jsonb
quarkus.langchain4j.pgvector.metadata.column-definitions=metadata JSONB NULL

quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.embedding-model.provider=ollama
quarkus.langchain4j.ollama.chat-model.model-name=${OLLAMA_MODEL:gemma4:e2b}
quarkus.langchain4j.ollama.chat-model.temperature=0
quarkus.langchain4j.ollama.embedding-model.model-name=${OLLAMA_EMBEDDING_MODEL:mxbai-embed-large}
quarkus.langchain4j.ollama.timeout=120s
quarkus.langchain4j.openai.api-key=dummy

%dev.quarkus.hibernate-orm.schema-management.strategy=validate
%dev.quarkus.flyway.clean-at-start=true

%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/qlawkus}
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:qlawkus}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:qlawkus}
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%prod.quarkus.langchain4j.chat-model.provider=openai
%prod.quarkus.langchain4j.embedding-model.provider=openai
%prod.quarkus.langchain4j.openai.base-url=${NVIDIA_BASE_URL:https://integrate.api.nvidia.com/v1}
%prod.quarkus.langchain4j.openai.api-key=${NVIDIA_AI_API_KEY:dummy}
%prod.quarkus.langchain4j.openai.chat-model.model-name=${NVIDIA_CHAT_MODEL:z-ai/glm-5.1}
%prod.quarkus.langchain4j.openai.chat-model.temperature=0
%prod.quarkus.langchain4j.openai.embedding-model.model-name=${NVIDIA_EMBEDDING_MODEL:nvidia/nv-embedqa-e5-v5}

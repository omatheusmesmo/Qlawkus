name: Docs Preview Build

# Builds the Roq static site for a PR and uploads it as an artifact.
# Runs on the untrusted pull_request trigger, so it must NOT use any secret:
# the deploy (docs-preview-deploy.yml) picks the artifact up in a trusted context.
on:
  pull_request:
    paths:
      - 'site/**'
      - 'docs/**'
      - '**/runtime/**/*.java'
      - '.github/workflows/docs-preview-build.yml'

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # Build the extensions so the config-doc metadata (from @ConfigMapping JavaDoc)
      # is available in the local repository.
      - name: Build extensions
        run: mvn -B -ntp install -DskipTests

      # Generate the AsciiDoc config reference into site/content/includes.
      - name: Generate config reference
        run: mvn -B -ntp -f docs/pom.xml package -DskipTests

      # Generate the static site into site/target/roq. SITE_PATH_PREFIX is empty
      # because Surge serves the preview at the domain root.
      - name: Generate static site
        env:
          QUARKUS_ROQ_GENERATOR_BATCH: 'true'
          SITE_PATH_PREFIX: ''
          SITE_URL: https://qlawkus-docs-${{ github.event.number }}-preview.surge.sh
        run: mvn -B -ntp -f site/pom.xml package quarkus:run -DskipTests

      - name: Store PR id
        run: echo ${{ github.event.number }} > site/target/roq/pr-id.txt

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/target/roq
          retention-days: 3

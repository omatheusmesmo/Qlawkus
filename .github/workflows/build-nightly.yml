name: Build nightly

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Full build + native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reclaim Disk Space
        run: .github/ci-prerequisites.sh

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build with Maven (JVM)
        run: ./mvnw -B clean install -Dci=true -Dno-format -ntp

      - name: Build with Maven (Native)
        run: ./mvnw -B install -Pnative -Dquarkus.native.container-build -Dnative.surefire.skip -Dno-format -ntp

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: '**/target/*-reports/TEST-*.xml'
          retention-days: 7

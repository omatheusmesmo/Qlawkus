name: Prepare Release

on:
  pull_request:
    types:
    - closed
    paths:
    - '.github/project.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  prepare-release:
    name: Prepare Release
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 25
        cache: maven

    - name: Install yq
      run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

    - name: Extract version from project.yml
      id: version
      run: |
        RELEASE_VERSION=$(yq '.release.current-version' .github/project.yml)
        NEXT_VERSION=$(yq '.release.next-version' .github/project.yml)
        echo "release_version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
        echo "next_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
        echo "Release version: ${RELEASE_VERSION}"
        echo "Next version: ${NEXT_VERSION}"

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Set release version in POMs
      run: ./mvnw -B versions:set -DnewVersion=${{ steps.version.outputs.release_version }} -DgenerateBackupPoms=false -ntp

    - name: Commit release version
      run: |
        git add -A
        git commit -m "chore: set version to ${{ steps.version.outputs.release_version }} for release"

    - name: Create release tag
      run: git tag -a ${{ steps.version.outputs.release_version }} -m "Release ${{ steps.version.outputs.release_version }}"

    - name: Push release tag
      run: git push origin ${{ steps.version.outputs.release_version }}

    - name: Set next SNAPSHOT version
      run: ./mvnw -B versions:set -DnewVersion=${{ steps.version.outputs.next_version }} -DgenerateBackupPoms=false -ntp

    - name: Update project.yml
      run: |
        yq -i ".release.current-version = \"${{ steps.version.outputs.next_version }}\"" .github/project.yml
        NEXT_SNAPSHOT=$(echo "${{ steps.version.outputs.next_version }}" | sed 's/-SNAPSHOT//')
        yq -i ".release.next-version = \"${NEXT_SNAPSHOT}-SNAPSHOT\"" .github/project.yml

    - name: Commit and push SNAPSHOT
      run: |
        git add -A
        git commit -m "chore: set version to ${{ steps.version.outputs.next_version }} after release"
        git push origin main

    - name: Trigger Perform Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh workflow run "Perform Release" --ref ${{ steps.version.outputs.release_version }} -f tag=${{ steps.version.outputs.release_version }}

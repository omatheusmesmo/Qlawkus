name: Docs Preview Deploy

# Deploys the site artifact built by "Docs Preview Build" to Surge.sh.
# Runs in the trusted workflow_run context, so the SURGE_TOKEN secret is safe here.
on:
  workflow_run:
    workflows: [ "Docs Preview Build" ]
    types:
      - completed

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    permissions:
      pull-requests: write
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read PR id
        id: pr
        run: |
          echo "id=$(<pr-id.txt)" >> $GITHUB_OUTPUT
          rm -f pr-id.txt

      - name: Publish to Surge.sh
        run: |
          for i in 1 2 3; do
            npx surge ./ --domain https://qlawkus-docs-${{ steps.pr.outputs.id }}-preview.surge.sh --token ${{ secrets.SURGE_TOKEN }} && exit 0
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Comment preview URL on success
        uses: quarkusio/action-helpers@main
        with:
          action: maintain-one-comment
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ steps.pr.outputs.id }}
          body: |
            🚀 Docs preview for ${{ github.sha }} is live:
            * https://qlawkus-docs-${{ steps.pr.outputs.id }}-preview.surge.sh
          body-marker: <!-- docs-preview-marker -->

      - name: Comment failure
        uses: quarkusio/action-helpers@main
        if: ${{ failure() }}
        with:
          action: maintain-one-comment
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ steps.pr.outputs.id }}
          body: |
            😭 Docs preview deploy failed.
          body-marker: <!-- docs-preview-marker -->

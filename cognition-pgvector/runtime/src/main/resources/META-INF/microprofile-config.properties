# Postgres/pgvector backend config, contributed only when the qlawkus-cognition-pgvector extension is
# on the classpath. Shipped as microprofile-config.properties (ordinal 100) so the application's own
# application.properties (ordinal 250) can still override any of these. When this extension is absent
# the markdown @DefaultBean stores win and no datasource is configured (database-free distribution).
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

quarkus.langchain4j.pgvector.table=embeddings
quarkus.langchain4j.pgvector.metadata.storage-mode=combined-jsonb
quarkus.langchain4j.pgvector.metadata.column-definitions=metadata JSONB NULL
# pgvector.dimension is emitted by LlmKindConfigSourceFactory from the resolved embedding kind.
